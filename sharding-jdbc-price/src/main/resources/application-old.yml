spring:
  shardingsphere:
    datasource:
      names: old-ds
      old-ds:
        type: com.alibaba.druid.pool.DruidDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://localhost:3306/price_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
        username: root
        password: 123456
        maxPoolSize: 50
        minPoolSize: 10
    
    sharding:
      default-data-source-name: old-ds
      
      tables:
        product_price:
          actual-data-nodes: old-ds.product_price
          key-generator:
            column: id
            type: AUTO
          table-strategy:
            none:
          database-strategy:
            none:
    
    props:
      sql:
        show: true
      executor:
        size: 20